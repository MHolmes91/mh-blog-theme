{{ if ne .TableOfContents `<nav id="TableOfContents"></nav>` }}
  <aside
    class="hidden lg:block sticky transition-all duration-300 rounded-2xl border border-purple-200 bg-white/95 backdrop-blur-sm p-4 shadow-sm h-fit"
    :style="`top: ${toolbarVisible ? '6rem' : '1.5rem'}`"
  >
    <h2 class="mb-3 text-sm font-bold uppercase tracking-wide">Contents</h2>
    <div class="max-h-[calc(100vh-8rem)] overflow-y-auto">
      {{ .TableOfContents }}
    </div>
  </aside>
  <div
    class="fixed lg:hidden z-50 transition-all duration-300"
    :style="`top: ${toolbarVisible ? '6rem' : '1.5rem'}; right: max(1.5rem, calc((100vw - 72rem) / 2 + 1.5rem))`"
    @keydown.escape.window="closeToc"
  >
    <div x-cloak x-show="tocOpen" @click="closeToc" class="fixed inset-0 -z-10"></div>
    <div x-show="!tocOpen" @click="toggleToc">
      <button
        type="button"
        aria-label="Table of contents"
        class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-white/95 backdrop-blur-sm border border-purple-200 text-purple-700 shadow-sm transition hover:shadow-md"
      >
        {{ partial "icon.html" (dict "name" "list" "class" "h-4 w-4") }}
      </button>
    </div>
    <div
      x-cloak
      x-show="tocOpen"
      x-transition:enter="transition ease-out duration-200"
      x-transition:enter-start="opacity-0 -translate-y-2 scale-95"
      x-transition:enter-end="opacity-100 translate-y-0 scale-100"
      x-transition:leave="transition ease-in duration-150"
      x-transition:leave-start="opacity-100 translate-y-0 scale-100"
      x-transition:leave-end="opacity-0 -translate-y-2 scale-95"
      @click.stop
      class="absolute right-0 w-[280px] max-h-[60vh] overflow-y-auto rounded-2xl border border-purple-200 bg-white/95 backdrop-blur-sm shadow-lg"
    >
      <div class="flex items-center justify-between p-4 pb-0">
        <h2 class="text-sm font-bold uppercase tracking-wide">Contents</h2>
        <button
          type="button"
          aria-label="Close table of contents"
          @click="closeToc"
          class="inline-flex h-7 w-7 items-center justify-center rounded-full border border-purple-300 transition hover:bg-purple-100"
        >
          {{ partial "icon.html" (dict "name" "x" "class" "h-3.5 w-3.5") }}
        </button>
      </div>
      <div class="p-4" @click="closeToc">
        {{ replaceRE `<nav id="TableOfContents">` `<nav id="TableOfContentsMobile">` .TableOfContents | safeHTML }}
      </div>
    </div>
  </div>
{{ end }}
