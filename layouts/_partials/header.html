<header
  role="banner"
  class="sticky top-0 z-40 border-b border-purple-200 bg-white/80 px-6 py-4 backdrop-blur-md transition-opacity duration-300"
  :class="{ 'opacity-0 pointer-events-none': !toolbarVisible && !searchOpen }"
>
  <div class="mx-auto flex max-w-6xl px-6 items-center justify-between gap-4">
    <a
      href="{{ site.Home.RelPermalink }}"
      class="flex items-center gap-3 text-xl font-bold"
    >
      <span
        class="inline-flex h-8 w-8 items-center justify-center rounded bg-purple-600 text-white"
        >M</span
      >
      <span>{{ site.Title }}</span>
    </a>
    <div class="flex items-center gap-3">
      <button
        type="button"
        aria-label="Search"
        @click="openSearch"
        class="inline-flex items-center gap-2 rounded border border-purple-300 px-3 py-2"
      >
        {{ partial "icon.html" (dict "name" "search" "class" "h-4 w-4") }}
        <span class="sr-only">Search</span>
      </button>
      <div
        x-cloak
        x-show="searchOpen"
        @click.self="closeSearch"
        @keydown.escape.window="closeSearch"
        data-testid="search-overlay"
        class="fixed inset-0 z-50 bg-black/40 p-6"
      >
        <div class="mx-auto max-w-2xl rounded-2xl bg-white p-4">
          <div class="flex items-center gap-3">
            <input
              x-ref="searchInput"
              x-model="query"
              placeholder="Search posts"
              class="w-full rounded border border-purple-300 px-3 py-2"
              @keydown.enter.prevent="navigateToActiveResult()"
              @keydown.arrow-down.prevent="selectNextResult()"
              @keydown.arrow-up.prevent="selectPrevResult()"
            />
            <button
              type="button"
              aria-label="Close search"
              @click="closeSearch"
              class="search-keycap inline-flex items-center justify-center rounded border border-purple-300 px-2.5 py-1.5 text-xs font-semibold uppercase tracking-wide text-slate-600"
            >
              ESC
            </button>
          </div>
          <template x-if="query.trim().length > 0 && query.trim().length < 3">
            <p class="mt-4 text-sm text-slate-500 text-center">
              Type at least 3 characters to search
            </p>
          </template>
          <template x-if="query.trim().length >= 3 && !results.length">
            <p class="mt-4 text-sm text-slate-500 text-center">No results</p>
          </template>
          <template x-if="query.trim().length >= 3 && results.length">
            <p class="mt-4 text-xs font-medium text-slate-600">
              <span x-text="results.length === 1 ? '1 result' : `${results.length} results`"></span>
            </p>
          </template>
          <div data-results-container class="search-results-list mt-4">
            <template
              x-for="(result, index) in results"
              :key="result.permalink"
            >
              <a
                :href="buildHighlightedPostUrl(result.permalink, query)"
                :data-result-index="index"
                class="search-result-card block rounded border px-3 py-2 transition-colors"
                :class="index === activeResultIndex
                  ? 'search-result-card-active border-purple-400'
                  : 'border-purple-200 hover:border-purple-300'"
              >
                <div
                  x-html="highlightText(result.title, query)"
                  class="search-result-title font-medium"
                ></div>
                <div
                  class="search-result-meta mt-1 flex min-h-[1.25rem] flex-nowrap items-center gap-1.5 overflow-x-auto overflow-y-hidden whitespace-nowrap"
                >
                  <template
                    x-for="item in (result._orderedMetadata || [])"
                    :key="`${item.kind}-${item.label}`"
                  >
                    <span
                      x-text="item.label"
                      class="shrink-0 text-xs"
                      :class="item.kind === 'series'
                        ? (item.matched ? 'underline font-semibold text-slate-900' : 'underline text-slate-900')
                        : (item.matched
                          ? 'inline-block rounded-full bg-purple-200 px-2 py-0.5 font-semibold text-purple-900'
                          : 'inline-block rounded-full bg-purple-100 px-2 py-0.5 text-slate-700')"
                    ></span>
                  </template>
                </div>
                <div
                  x-show="result._context"
                  class="search-result-excerpt mt-1 text-sm text-slate-500"
                >
                  <span x-html="highlightText(result._context, query)"></span>
                </div>
              </a>
            </template>
          </div>
        </div>
      </div>
    </div>
  </div>
</header>
