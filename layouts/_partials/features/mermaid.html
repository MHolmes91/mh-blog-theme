{{ if .Store.Get "hasMermaid" }}
  <style>
    svg[id^="mermaid-"] {
      display: block;
      margin: 0 auto;
    }
  </style>
  <script type="module">
    import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

    function getCurrentTheme() {
      return document.body.getAttribute("data-theme") === "dark" ? "dark" : "default";
    }

    function waitForTheme() {
      if (document.body.getAttribute("data-theme")) {
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        const observer = new MutationObserver(() => {
          if (!document.body.getAttribute("data-theme")) return;
          observer.disconnect();
          resolve();
        });

        observer.observe(document.body, {
          attributes: true,
          attributeFilter: ["data-theme"],
        });
      });
    }

    async function renderMermaid(selector) {
      mermaid.initialize({
        startOnLoad: false,
        theme: getCurrentTheme(),
        securityLevel: "loose",
      });
      await mermaid.run({ querySelector: selector });
      document.querySelectorAll(selector).forEach((element) => {
        element.classList.remove("mermaid");
      });
    }

    await waitForTheme();
    await renderMermaid(".mermaid");
  </script>
{{ end }}
