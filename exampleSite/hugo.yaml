baseURL: https://example.org/
languageCode: en-us
title: MH Blog Theme
theme: mh-blog-theme

markup:
  tableOfContents:
    endLevel: 4

privacy:
  x:
    simple: true

outputs:
  home:
    - html
    - rss
    - json

taxonomies:
  tag: tags
  series: series

related:
  includeNewer: true
  threshold: 20
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: summary
      weight: 70
    - name: date
      weight: 20
      pattern: "200601"

params:
  description: Example site for MH Blog Theme
  siteIcon: /favicon.svg
  intro:
    title: Mark's Notes
    body: Functional Hugo theme fixture content.
  socials:
    - name: GitHub
      url: https://github.com/example
      icon: github
    - name: Email
      url: mailto:hello@example.org
      icon: email
    - name: LinkedIn
      url: https://www.linkedin.com/in/example
      icon: linkedin
    - name: Bluesky
      url: https://bsky.app/profile/example.org
      icon: bluesky
    - name: StackOverflow
      url: https://stackoverflow.com/users/123456/example
      icon: stackoverflow
